version: '3.8'

services:
  mysql:
    image: mysql:8.4.5
    container_name: book-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_book
    ports:
      - '3307:3306'
    networks:
      - book-networks
    restart: unless-stopped
  redis:
    image: redis:8.2.1
    container_name: book-redis
    command: ['redis-server', '--requirepass', 'admin123654']
    ports:
      - '6666:6379'
    networks:
      - book-networks
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: book-elasticsearch
    environment:
      - discovery.type=single-node
      - ELASTIC_USERNAME=elastic
      - ELASTIC_PASSWORD=admin123654
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
    ports:
      - '9201:9200'
    networks:
      - book-networks
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 1g
    restart: unless-stopped

networks:
  book-networks:
    driver: bridge

# docker compose up -d
# -d: background mode